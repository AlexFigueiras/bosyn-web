<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSYN Holding - Hero</title>
    <link rel="stylesheet" href="theme-tokens.css">
    <link rel="stylesheet" href="Hero.css">
</head>
<body>
    <section class="hero" id="hero-section">
        <div class="hero-container">
            <!-- Monograma SVG 3x3 -->
            <div class="monogram-wrapper">
                <svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BOSYN Monogram">
                    <!-- Row 1 -->
                    <rect x="0" y="0" width="20" height="20" fill="var(--black-logo)" />
                    <rect x="24" y="0" width="20" height="20" fill="var(--black-logo)" />
                    <!-- Empty (Row 1, Col 3) -->
                    
                    <!-- Row 2 -->
                    <rect x="0" y="24" width="20" height="20" fill="var(--black-logo)" />
                    <rect x="24" y="24" width="20" height="20" fill="var(--black-logo)" />
                    <rect x="48" y="24" width="20" height="20" fill="var(--black-logo)" />
                    
                    <!-- Row 3 -->
                    <rect x="0" y="48" width="20" height="20" fill="var(--black-logo)" />
                    <rect x="24" y="48" width="20" height="20" fill="var(--black-logo)" />
                    <!-- Empty (Row 3, Col 3) -->
                </svg>
            </div>

            <div class="brand-name">BOSYN</div>
            
            <h1 class="hero-title">Inteligência em cada camada.</h1>
            <p class="hero-description">Não apenas construímos espaços. Sincronizamos tecnologia, design e engenharia.</p>
        </div>

        <!-- Acento Tech -->
        <div class="tech-accent"></div>
    </section>
</body>
</html>
