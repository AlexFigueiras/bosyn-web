<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSYN Manifesto</title>
    <link rel="stylesheet" href="theme-tokens.css">
    <link rel="stylesheet" href="Manifesto.css">
</head>
<body>
    <section class="manifesto-section">
        <div class="manifesto-grid">
            <!-- BUILD -->
            <article class="manifesto-col">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" class="minimal-icon">
                        <rect x="6" y="6" width="12" height="12" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <h2 class="col-title">BUILD</h2>
                <p class="col-content">A materialização do bit em átomo. Execução rigorosa com materiais nobres.</p>
            </article>

            <!-- ORGANIZE -->
            <article class="manifesto-col">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" class="minimal-icon">
                        <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <h2 class="col-title">ORGANIZE</h2>
                <p class="col-content">Gestão de fluxo, cronograma e processos Kaizen aplicado à construção.</p>
            </article>

            <!-- SYNCHRONIZE -->
            <article class="manifesto-col">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" class="minimal-icon">
                        <path d="M12 6L18 16.5H6L12 6Z" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <h2 class="col-title">SYNCHRONIZE</h2>
                <p class="col-content">A camada Tech. Projetos que conversam entre si e automação digital.</p>
            </article>
        </div>
    </section>
</body>
</html>
